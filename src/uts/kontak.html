        color: #dc2626;
      }
    </style>
  </head>

  <body>

          href="../../index.html"
          class="navbar-brand fw-bolder d-flex align-items-center fs-4 text-dark"
        >
          <img
            src="../asset/logo.png"
            alt="Logo"
            width="48"
            height="48"
            class="me-2"
          />
          Bimbel <span class="text-primary ms-1">Prestasi</span>
        </a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div
          class="collapse navbar-collapse justify-content-end"
          id="navbarNav"
        >
          <div
            class="navbar-nav align-items-center gap-3 fw-semibold"
            style="font-size: 0.9rem"
          >
            <a class="nav-link text-secondary" href="../../index.html"
              >Beranda</a
            >
            <a class="nav-link text-secondary" href="/src/uts/keunggulan.html"
              >Keunggulan</a
            >
            <a class="nav-link text-secondary" href="/src/uts/program.html"
              >Program</a
            >
            <a class="nav-link text-secondary" href="/src/jadwal.html"
              >Jadwal</a
            >
            <a class="nav-link text-secondary" href="/src/tentang.html"
              >Tentang</a
            >
            <a class="nav-link text-secondary" href="/src/uts/testimoni.html"
              >Testimoni</a
            >
            <a class="nav-link text-secondary" href="/src/hubungi.html"
              >Hubungi</a
            >
            <a
              href="/src/uts/kontak.html"
              class="btn btn-primary text-white rounded-pill px-4 py-2 ms-lg-2 fw-bold"
              >Daftar</a
            >
          </div>
        </div>
      </div>
    </nav>

    <div style="height: 90px"></div>

    <div class="container py-5">
      <div class="card border-0 shadow-sm p-4 p-md-5 rounded-4 bg-white">
        <h2 class="fw-bold text-center mb-3">Pendaftaran Online</h2>
        <p class="text-center text-secondary mb-5">
          Lengkapi formulir di bawah ini untuk bergabung.
        </p>

        <form name="formDaftar" class="row g-3 justify-content-center">
          <div class="col-md-8">
            <div class="mb-3">
              <label class="form-label fw-semibold">Nama Lengkap Siswa</label>
              <input
                type="text"
                name="nama"
                class="form-control"
                placeholder="Nama Lengkap"
                required
              />
            </div>
            <div class="mb-3">
              <label class="form-label fw-semibold">No. WhatsApp (Aktif)</label>
              <input
                type="tel"
                name="wa"
                class="form-control"
                placeholder="08..."
                required
              />
            </div>

            <!-- Implementasi Objek Radio -->
            <div class="mb-3">
              <label class="form-label fw-semibold d-block"
                >Tingkat Pendidikan</label
              >
              <div class="form-check form-check-inline">
                <input
                  class="form-check-input"
                  type="radio"
                  name="tingkat"
                  id="smp"
                  value="SMP"
                />
                <label class="form-check-label" for="smp">SMP</label>
              </div>
              <div class="form-check form-check-inline">
                <input
                  class="form-check-input"
                  type="radio"
                  name="tingkat"
                  id="sma"
                  value="SMA"
                />
                <label class="form-check-label" for="sma">SMA</label>
              </div>
            </div>

            <!-- Implementasi Objek Checkbox -->
            <div class="mb-3">
              <label class="form-label fw-semibold d-block"
                >Fasilitas Tambahan</label
              >
              <div class="form-check">
                <input
                  class="form-check-input"
                  type="checkbox"
                  name="fasilitas1"
                  id="modul"
                  value="ON"
                />
                <label class="form-check-label" for="modul"
                  >Modul Cetak Khusus</label
                >
              </div>
              <div class="form-check">
                <input
                  class="form-check-input"
                  type="checkbox"
                  name="fasilitas2"
                  id="tryout"
                  value="ON"
                />
                <label class="form-check-label" for="tryout"
                  >Akses Tryout CBT</label
                >
              </div>
            </div>

            <div class="mb-3">
              <label class="form-label fw-semibold">Pilih Program</label>
              <select name="program" class="form-select">
                <option value="Reguler Class">Reguler Class</option>
                <option value="Intensif UTBK">Intensif UTBK</option>
                <option value="Privat Eksklusif">Privat Eksklusif</option>
              </select>
            </div>
            <div class="mb-3">
              <label class="form-label fw-semibold">Pesan/Pertanyaan</label>
              <textarea
                name="pesan"
                class="form-control"
                rows="3"
                placeholder="Tanyakan apa saja..."
              ></textarea>
            </div>

            <div class="text-center mt-4">
              <button
                type="button"
                class="btn btn-primary btn-lg rounded-pill px-5"
                onclick="prosesDaftar()"
              >
                Kirim Sekarang
              </button>
            </div>

            <!-- Implementasi Objek Textarea untuk Output -->
            <div class="mt-5">
              <label class="form-label fw-semibold"
                >Output Hasil Pendaftaran:</label
              >
              <textarea
                name="outputHasil"
                class="form-control bg-light fw-bold text-primary"
                rows="6"
                readonly
              ></textarea>
            </div>
          </div>
        </form>

        <script language="JavaScript">
          function prosesDaftar() {
            var namaStr = document.formDaftar.nama.value;
            var waStr = document.formDaftar.wa.value;
            var programStr = document.formDaftar.program.value;
            var pesanStr = document.formDaftar.pesan.value;

            var tingkatStr = '';
            if (document.formDaftar.tingkat[0].checked == true) {
              tingkatStr = 'SMP';
            } else {
              tingkatStr = 'SMA';
            }

            var fasilitastr = '';
            if (document.formDaftar.fasilitas1.checked == true) {
              fasilitastr += '- Modul Cetak Khusus\n';
            }
            if (document.formDaftar.fasilitas2.checked == true) {
              fasilitastr += '- Akses Tryout CBT\n';
            }
            if (fasilitastr == '') {
              fasilitastr = '- Tidak ada fasilitas tambahan\n';
            }

            var hasilAkhir =
              'Nama Siswa: ' +
              namaStr +
              '\n' +
              'Nomor WA: ' +
              waStr +
              '\n' +
              'Tingkat: ' +
              tingkatStr +
              '\n' +
              'Program: ' +
              programStr +
              '\n' +
              'Tambahan:\n' +
              fasilitastr +
              'Pesan: ' +
              pesanStr;

            document.formDaftar.outputHasil.value = hasilAkhir;
            alert('Data atas nama ' + namaStr + ' berhasil diidentifikasi!');
          }
        </script>
      </div>
    </div>
    <script src="../node_modules/@popperjs/core/dist/umd/popper.min.js"></script>
    <script src="../node_modules/bootstrap/dist/js/bootstrap.min.js"></script>
  </body>
</html>

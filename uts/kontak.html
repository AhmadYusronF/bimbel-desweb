<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bimbel Prestasi - Daftar</title>
    <style>
  
    </style>
  </head>
  <body>
    <nav>
      <div class="nav-container">
        <a href="index.html" class="logo">Bimbel Prestasi</a>
        <div class="nav-links">
          <a href="index.html">Beranda</a>
          <a href="keunggulan.html">Keunggulan</a>
          <a href="program.html">Program</a>
          <a href="testimoni.html">Testimoni</a>
          <a href="kontak.html" class="btn-daftar" style="background: #1e293b"
            >Daftar</a
          >
        </div>
      </div>
    </nav>

    <div class="container">
      <div class="form-card">
        <h2>Pendaftaran Online</h2>
        <p>Lengkapi formulir di bawah ini untuk bergabung.</p>
        <form
          onsubmit="
            event.preventDefault();
            alert(
              'Pendaftaran berhasil dikirim! Admin akan menghubungi melalui WhatsApp.',
            );
          "
        >
          <div class="form-group">
            <label>Nama Lengkap Siswa</label>
            <input type="text" placeholder="Contoh: Budi Santoso" required />
          </div>
          <div class="form-group">
            <label>No. WhatsApp (Aktif)</label>
            <input type="tel" placeholder="0812xxxx" required />
          </div>
          <div class="form-group">
            <label>Pilih Program</label>
            <select>
              <option>Reguler Class</option>
              <option>Intensif UTBK</option>
              <option>Privat Eksklusif</option>
            </select>
          </div>
          <div class="form-group">
            <label>Pesan/Pertanyaan</label>
            <textarea rows="3" placeholder="Tanyakan apa saja..."></textarea>
          </div>
          <button type="submit" class="btn-submit">Kirim Sekarang</button>
        </form>
      </div>
    </div>
  </body>
</html>
